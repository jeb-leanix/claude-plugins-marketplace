name: Build Plugins

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PRIVATE_REPO_ACCESS_TOKEN }}

      - name: Checkout submodules using token
        run: |
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            plugins/*/package-lock.json
            plugins/*/*/package-lock.json

      - name: Build all plugins
        run: |
          chmod +x ./build-plugins.sh
          ./build-plugins.sh

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Commit built artifacts to 'built' branch
        run: |
          # Create or checkout built branch
          git checkout -B built

          # Add built artifacts (build/ directories)
          git add -f plugins/*/build/ plugins/*/*/build/ 2>/dev/null || true
          git add -f plugins/*/node_modules/ plugins/*/*/node_modules/ 2>/dev/null || true

          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build plugins from main@${GITHUB_SHA:0:7}"
            git push -f origin built
          fi

      - name: Create .gitignore for built branch
        run: |
          # Temporarily remove .gitignore rules that ignore build artifacts
          cat > .gitignore.built << 'EOF'
          # macOS
          .DS_Store

          # IDEs
          .idea/
          .vscode/
          *.swp
          *.swo

          # Temp files
          *.tmp
          *.log
          EOF

          mv .gitignore.built .gitignore
          git add .gitignore
          git commit -m "Update .gitignore for built branch" || true
          git push origin built || true

permissions:
  contents: write
